<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/htmx.org@2.0.7"></script>
    <title>Substations Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        overflow: hidden;
      }

      #map {
        height: 100vh;
        width: 100%;
      }

      .map-overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000;
      }

      .substation-info {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #ededed;
        font-size: 0.875rem;
        color: #7f8c8d;
      }

      .voltage-group {
        margin-bottom: 12px;
      }

      .voltage-group label {
        display: flex;
        align-items: center;
        cursor: pointer;
        padding: 8px;
        border-radius: 6px;
        transition: background-color 0.2s;
      }

      .voltage-group label:hover {
        background-color: #f8f9fa;
      }

      .voltage-group input[type="checkbox"] {
        margin-right: 10px;
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #3498db;
      }

      .voltage-group .color-indicator {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        margin-right: 10px;
        border: 2px solid rgba(0, 0, 0, 0.1);
        flex-shrink: 0;
      }

      .voltage-group .voltage-label {
        flex: 1;
        font-size: 14px;
        color: #34495e;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div
      class="columns is-flex is-flex-direction-column is-align-items-flex-end mr-3 mt-3 map-overlay"
    >
      <div class="column is-narrow">
        <div class="box">
          <p class="title is-5">Voltage Levels</p>
          <div id="voltage-controls"></div>
          <p class="substation-info">
            <strong id="substation-count">0</strong> substations<br />
            <strong id="line-count">0</strong> lines
          </p>
        </div>
      </div>

      <div class="column is-narrow">
        <div class="box">
          <p class="title is-5">Actions</p>
          <form id="active-production-form" hx-post="/flow" hx-swap="innerHTML">
            <!-- Inputs will be added here -->
          </form>
        </div>
      </div>
    </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/js/map.js"></script>
    <script>
      var substations = {{ .Substations | toJSON }};
      var lines = {{ .Lines | toJSON }};
      initMap(substations, lines);
    </script>
  </body>
</html>
